name: ecocaptura
description: "A field data capture app for Provita."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  geolocator: ^13.0.0
  sensors_plus: ^7.0.0 
  flutter_compass: ^0.8.1
  camera: ^0.12.0+1
  json_annotation: ^4.12.0
  path_provider: ^2.1.6
  flutter_slidable: ^4.0.3
  flutter_rotation_sensor: ^0.3.0
  photo_view: ^0.15.0
  flutter_rating_bar: ^4.0.1
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  archive: ^4.0.9
  share_plus: ^13.2.0
  package_info_plus: ^10.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/org_logo.png